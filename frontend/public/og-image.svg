<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="22" height="22" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="22" stroke="#C6FF00" stroke-width="1" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#0A1220"/>
  <rect width="1200" height="630" fill="url(#hatch)"/>

  <!-- Top-left brand lockup -->
  <g transform="translate(72, 72)">
    <!-- Mark -->
    <g stroke-linecap="square">
      <line x1="32" y1="8" x2="6" y2="58" stroke="#FFFFFF" stroke-width="7"/>
      <line x1="32" y1="8" x2="58" y2="58" stroke="#FFFFFF" stroke-width="7"/>
      <line x1="16" y1="42" x2="48" y2="42" stroke="#C6FF00" stroke-width="5"/>
    </g>
    <circle cx="32" cy="5" r="3.2" fill="#C6FF00"/>

    <!-- Wordmark -->
    <g transform="translate(82, 0)">
      <text x="0" y="38" font-family="Anton, Impact, sans-serif" font-size="44" letter-spacing="2" fill="#FFFFFF">TENNIS PRO</text>
      <text x="222" y="38" font-family="Anton, Impact, sans-serif" font-size="44" letter-spacing="2" fill="#C6FF00">ANALYSIS</text>
    </g>
  </g>

  <!-- Bottom-left headline -->
  <g transform="translate(72, 360)">
    <text font-family="Anton, Impact, sans-serif" font-size="148" letter-spacing="2" fill="#FFFFFF" x="0" y="0">TENNIS PERFORMANCE<tspan fill="#C6FF00">.</tspan></text>
    <text font-family="Anton, Impact, sans-serif" font-size="148" letter-spacing="2" fill="#FFFFFF" x="0" y="148">MEASURED<tspan fill="#C6FF00">.</tspan></text>
  </g>

  <!-- Bottom-right meta -->
  <g transform="translate(72, 570)">
    <text font-family="'Space Grotesk', 'Inter', sans-serif" font-size="18" letter-spacing="8" fill="#A7B0BA">BY ALI ZEVKLI  ·  @TENNISPROANALYSIS</text>
  </g>

  <!-- Right-side ornamental data line + dot -->
  <line x1="1000" y1="72" x2="1128" y2="72" stroke="#C6FF00" stroke-width="3"/>
  <circle cx="1128" cy="72" r="6" fill="#C6FF00"/>
</svg>
